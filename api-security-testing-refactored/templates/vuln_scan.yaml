# 漏洞扫描工作流
#
# ⚠️ 参考说明：本文件为参考测试流程模板
# - 实际测试应根据目标特性和风险评估选择性地执行阶段
# - payload 和测试技术应根据实际情况动态构造
# - 本文件仅供参考，非固定测试流程

name: 漏洞扫描
version: 3.0
description: 综合漏洞扫描流程，覆盖 OWASP API Top 10（参考模板）

stages:
  # 阶段 1: 侦察与发现
  - name: 侦察与发现
    description: 收集目标 API 的基本信息
    tasks:
      - name: identify_api_endpoints
        description: 识别 API 端点
        tool: api_tester
        params:
          action: discover
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
          common_paths:
            - /api
            - /api/v1
            - /api/v2
            - /rest
            - /graphql
            - /swagger
            - /api-docs

      - name: fingerprint_tech_stack
        description: 指纹识别技术栈
        tool: api_tester
        params:
          action: fingerprint
          checks:
            - server_header
            - x-powered-by
            - content_type
            - response_patterns

      - name: identify_api_version
        description: 识别 API 版本
        tool: api_tester
        params:
          action: check_versions
          versions:
            - /api/v1
            - /api/v2
            - /api/v3
            - /v1
            - /v2
            - /v3

  # 阶段 2: SQL 注入测试
  - name: SQL 注入测试
    description: 测试 SQL 注入漏洞
    tasks:
      - name: test_sqli_boolean
        description: 测试布尔型注入
        tool: api_tester
        params:
          action: test_sqli
          technique: boolean_based
          payloads:
            - "' AND '1'='1"
            - "' AND '1'='2"
            - "' OR '1'='1"
            - "1' AND '1'='1"

      - name: test_sqli_union
        description: 测试 UNION 注入
        tool: api_tester
        params:
          action: test_sqli
          technique: union_based
          payloads:
            - "' UNION SELECT NULL--"
            - "' UNION SELECT NULL,NULL--"
            - "' UNION SELECT NULL,NULL,NULL--"

      - name: test_sqli_error
        description: 测试错误型注入
        tool: api_tester
        params:
          action: test_sqli
          technique: error_based
          payloads:
            - "' AND EXTRACTVALUE(1,CONCAT(0x7e,version()))--"
            - "' AND UPDATEXML(1,CONCAT(0x7e,version()),1)--"

      - name: test_sqli_blind
        description: 测试盲注
        tool: api_tester
        params:
          action: test_sqli
          technique: blind
          payloads:
            - "' AND 1=1--"
            - "' AND 1=2--"
            - "1' AND SLEEP(5)--"

      - name: test_sqli_waf_bypass
        description: 测试 WAF 绕过
        tool: api_tester
        params:
          action: test_sqli
          technique: waf_bypass
          payloads:
            - "'/*!UNION*/ SELECT NULL--"
            - "'+UNION+SELECT+NULL--"
            - "1%27%20OR%201%3D1--"

  # 阶段 3: XSS 测试
  - name: XSS 测试
    description: 测试跨站脚本漏洞
    tasks:
      - name: test_xss_reflected
        description: 测试反射型 XSS
        tool: api_tester
        params:
          action: test_xss
          type: reflected
          payloads:
            - "<script>alert(1)</script>"
            - "<img src=x onerror=alert(1)>"
            - "<svg onload=alert(1)>"
            - "javascript:alert(1)"

      - name: test_xss_stored
        description: 测试存储型 XSS
        tool: api_tester
        params:
          action: test_xss
          type: stored
          payloads:
            - "<script>alert(1)</script>"
            - "<img src=x onerror=alert(1)>"

      - name: test_xss_dom
        description: 测试 DOM XSS
        tool: browser_tester
        params:
          action: test_dom_xss
          payloads:
            - "#<img src=x onerror=alert(1)>"
            - "<script>eval(location.hash)</script>"

      - name: test_xss_waf_bypass
        description: 测试 XSS WAF 绕过
        tool: api_tester
        params:
          action: test_xss
          type: bypass
          payloads:
            - "<scr<script>ipt>alert(1)</scr</script>ipt>"
            - "<img src='x' onerror='alert(1)'>"
            - "<svg><script>alert(1)</script></svg>"

  # 阶段 4: IDOR 测试
  - name: IDOR 测试
    description: 测试不安全的直接对象引用
    tasks:
      - name: test_idor_horizontal
        description: 测试水平越权
        tool: api_tester
        params:
          action: test_idor
          type: horizontal
          test_range: 1-100

      - name: test_idor_vertical
        description: 测试垂直越权
        tool: api_tester
        params:
          action: test_idor
          type: vertical
          roles:
            - user
            - admin

      - name: test_idor_parameter
        description: 测试参数篡改
        tool: api_tester
        params:
          action: test_idor
          type: parameter_tampering

  # 阶段 5: 认证测试
  - name: 认证测试
    description: 测试认证机制安全性
    tasks:
      - name: test_auth_bypass
        description: 测试认证绕过
        tool: api_tester
        params:
          action: test_auth_bypass
          techniques:
            - header_bypass
            - sql_injection
            - default_credentials

      - name: test_jwt_security
        description: 测试 JWT 安全性
        tool: api_tester
        params:
          action: test_jwt
          checks:
            - alg_none
            - weak_secret
            - no_expiration
            - missing_validation

      - name: test_session_management
        description: 测试会话管理
        tool: api_tester
        params:
          action: test_session
          checks:
            - session_fixation
            - session_hijacking
            - weak_session_id

  # 阶段 6: 敏感数据暴露测试
  - name: 敏感数据暴露测试
    description: 测试敏感数据保护
    tasks:
      - name: test_sensitive_data_exposure
        description: 测试敏感数据暴露
        tool: api_tester
        params:
          action: test_info_disclosure
          checks:
            - password_in_response
            - internal_paths
            - stack_trace
            - sensitive_headers

      - name: test_data_in_url
        description: 测试 URL 中的敏感数据
        tool: api_tester
        params:
          action: test_url_params
          checks:
            - api_key_in_url
            - token_in_url
            - sensitive_data_in_query

  # 阶段 7: 速率限制测试
  - name: 速率限制测试
    description: 测试速率限制机制
    tasks:
      - name: test_rate_limiting
        description: 测试速率限制
        tool: api_tester
        params:
          action: test_rate_limit
          requests: 100
          timeframe: 60

      - name: test_brute_force
        description: 测试暴力破解防护
        tool: api_tester
        params:
          action: test_brute_force
          max_attempts: 50

  # 阶段 8: 业务逻辑测试
  - name: 业务逻辑测试
    description: 测试业务逻辑漏洞
    tasks:
      - name: test_mass_assignment
        description: 测试批量赋值
        tool: api_tester
        params:
          action: test_mass_assignment
          fields:
            - is_admin
            - role
            - user_id

      - name: test_workflow_bypass
        description: 测试工作流绕过
        tool: api_tester
        params:
          action: test_workflow
          steps:
            - register
            - verify
            - purchase

      - name: test_race_condition
        description: 测试竞态条件
        tool: api_tester
        params:
          action: test_race_condition
          concurrent_requests: 10

  # 阶段 9: 文件操作测试
  - name: 文件操作测试
    description: 测试文件上传和访问
    tasks:
      - name: test_file_upload
        description: 测试文件上传
        tool: api_tester
        params:
          action: test_upload
          extensions:
            - .php
            - .jsp
            - .asp
            - .html

      - name: test_path_traversal
        description: 测试路径遍历
        tool: api_tester
        params:
          action: test_path_traversal
          payloads:
            - "../etc/passwd"
            - "..%2F..%2Fetc%2Fpasswd"
            - "....//....//etc/passwd"

  # 阶段 10: CORS 测试
  - name: CORS 测试
    description: 测试跨域资源共享配置
    tasks:
      - name: test_cors_misconfiguration
        description: 测试 CORS 错误配置
        tool: api_tester
        params:
          action: test_cors
          check:
            - arbitrary_origin
            - credentials_allowed
            - null_origin

# 输出配置
output:
  format:
    - json
    - markdown
  report_path: ./reports/vuln_scan
  include:
    - executive_summary
    - vulnerability_details
    - risk_assessment
    - remediation_steps
  severity_threshold: info
