# API 接口渗透测试工作流
#
# ⚠️ 参考说明：本文件为参考测试流程模板
# - 实际测试应根据目标特性灵活调整阶段顺序和任务内容
# - 阶段和任务的增减应由 Agent 根据上下文动态决策
# - 本文件仅供参考，非固定测试流程

name: API 接口渗透测试
version: 3.0
description: 自动化 API 接口渗透测试流程（参考模板）

stages:
  # 阶段 1: 信息收集
  - name: 信息收集
    description: 发现 API 端点和识别技术栈
    tasks:
      - name: scan_endpoints
        description: 扫描常见 API 端点
        tool: api_tester
        params:
          action: discover
          common_paths:
            - /api
            - /api/v1
            - /api/v2
            - /rest
            - /service
            - /admin
            - /login
      
      - name: identify_methods
        description: 识别支持的 HTTP 方法
        tool: api_tester
        params:
          action: options_scan
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
      
      - name: detect_auth
        description: 检测认证机制
        tool: api_tester
        params:
          action: auth_detect
          check_points:
            - 401_response
            - 403_response
            - login_redirect
            - token_requirement
      
      - name: fingerprint_tech
        description: 识别技术栈
        tool: api_tester
        params:
          action: fingerprint
          indicators:
            - server_header
            - x_powered_by
            - cookies
            - error_pages
    
    exit_conditions:
      - endpoints_found >= 5
      - timeout 300s

  # 阶段 2: 认证测试
  - name: 认证测试
    description: 测试认证机制的安全性
    tasks:
      - name: test_default_credentials
        description: 测试默认密码
        tool: api_tester
        params:
          action: brute_force
          credentials:
            - admin:admin
            - admin:admin123
            - admin:password
            - root:root
            - test:test
          max_attempts: 100
      
      - name: test_auth_bypass
        description: 测试认证绕过
        tool: api_tester
        params:
          action: bypass_test
          techniques:
            - path_traversal
            - parameter_pollution
            - header_injection
            - method_switch
      
      - name: test_jwt_weakness
        description: 测试 JWT 弱点
        tool: api_tester
        params:
          action: jwt_test
          tests:
            - none_algorithm
            - weak_secret
            - key_confusion
            - expired_token
      
      - name: test_session_management
        description: 测试会话管理
        tool: api_tester
        params:
          action: session_test
          checks:
            - session_fixation
            - session_timeout
            - secure_flag
            - httponly_flag
    
    exit_conditions:
      - vuln_found == true
      - all_tests_complete

  # 阶段 3: 漏洞测试
  - name: 漏洞测试
    description: 全面漏洞扫描
    tasks:
      - name: test_sqli
        description: SQL 注入测试
        tool: api_tester
        params:
          action: sqli_scan
          payload_file: payloads/sqli.json
          test_params:
            - id
            - user_id
            - username
            - search
            - query
          techniques:
            - boolean_based
            - union_based
            - error_based
            - time_based
            - blind
      
      - name: test_xss
        description: XSS 测试
        tool: api_tester
        params:
          action: xss_scan
          payload_file: payloads/xss.json
          test_params:
            - q
            - search
            - name
            - comment
          types:
            - reflected
            - stored
            - dom
      
      - name: test_command_injection
        description: 命令注入测试
        tool: api_tester
        params:
          action: rce_scan
          test_params:
            - cmd
            - exec
            - command
            - ping
      
      - name: test_path_traversal
        description: 路径遍历测试
        tool: api_tester
        params:
          action: lfi_scan
          test_params:
            - file
            - path
            - document
          payloads:
            - ../../../etc/passwd
            - ....//....//etc/passwd
      
      - name: test_idor
        description: IDOR 测试
        tool: api_tester
        params:
          action: idor_scan
          test_params:
            - id
            - user_id
            - account_id
          test_values:
            - 1
            - 2
            - 3
            - 100
            - 1000
      
      - name: test_rate_limiting
        description: 速率限制测试
        tool: api_tester
        params:
          action: rate_limit_test
          endpoints:
            - /api/login
            - /api/register
            - /api/password/reset
          max_requests: 100
          time_window: 60s
    
    exit_conditions:
      - all_tests_complete
      - critical_vuln_found

  # 阶段 4: 报告生成
  - name: 报告生成
    description: 生成测试报告
    tasks:
      - name: generate_summary
        description: 生成执行摘要
        tool: report_generator
        params:
          action: summary
          include:
            - total_tests
            - vuln_count
            - risk_score
      
      - name: export_results
        description: 导出结果
        tool: report_generator
        params:
          action: export
          formats:
            - markdown
            - json
            - html
          output_dir: ./reports/
      
      - name: create_remediation
        description: 生成修复建议
        tool: report_generator
        params:
          action: remediation
          priority:
            - critical
            - high
            - medium
    
    exit_conditions:
      - report_generated

# 全局配置
config:
  timeout: 3600s
  rate_limit: 10  # requests per second
  threads: 5
  user_agent: "Mozilla/5.0 (compatible; SecurityTesting/2.0)"
  save_state: true
  waf_bypass: true

# 通知配置
notifications:
  on_critical_vuln: true
  on_completion: true
  channels:
    - email
    - slack
    - webhook
